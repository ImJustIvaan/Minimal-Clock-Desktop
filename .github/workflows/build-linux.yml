name: Build Linux AppImage & Deb

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: minimal_clock
  APP_DISPLAY_NAME: Minimal Clock
  APP_ID: com.ImJustIvaan.MinimalClock
  APP_VERSION: 1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libnotify-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Stage bundle
        run: |
          BUNDLE_DIR="build/linux/x64/release/bundle"
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "Bundle directory not found at $BUNDLE_DIR"
            exit 1
          fi
          echo "BUNDLE_DIR=$BUNDLE_DIR" >> "$GITHUB_ENV"
          cp macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png "$BUNDLE_DIR/../${APP_NAME}.png" || true
          cp macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png /tmp/${APP_NAME}.png

      - name: Build .deb package
        run: |
          set -e
          PKG_ROOT="pkgroot"
          rm -rf "$PKG_ROOT"
          INSTALL_DIR="$PKG_ROOT/opt/${APP_NAME}"
          mkdir -p "$INSTALL_DIR"
          cp -R "$BUNDLE_DIR"/. "$INSTALL_DIR/"

          mkdir -p "$PKG_ROOT/usr/bin"
          ln -s "/opt/${APP_NAME}/${APP_NAME}" "$PKG_ROOT/usr/bin/${APP_NAME}"

          mkdir -p "$PKG_ROOT/usr/share/applications"
          cat > "$PKG_ROOT/usr/share/applications/${APP_ID}.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=${APP_DISPLAY_NAME}
          Comment=A beautiful minimalist clock app for desktop
          Exec=${APP_NAME} %u
          Icon=${APP_ID}
          Categories=Utility;Clock;
          MimeType=x-scheme-handler/minimalclock;
          Terminal=false
          EOF

          mkdir -p "$PKG_ROOT/usr/share/icons/hicolor/512x512/apps"
          cp /tmp/${APP_NAME}.png "$PKG_ROOT/usr/share/icons/hicolor/512x512/apps/${APP_ID}.png"

          mkdir -p "$PKG_ROOT/DEBIAN"
          INSTALLED_SIZE=$(du -sk "$PKG_ROOT/opt" | cut -f1)
          cat > "$PKG_ROOT/DEBIAN/control" <<EOF
          Package: minimal-clock
          Version: ${APP_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Installed-Size: ${INSTALLED_SIZE}
          Depends: libgtk-3-0
          Maintainer: ImJustIvaan <hello@ivaan.cc>
          Description: A beautiful minimalist clock app for desktop.
           Minimal Clock is a clean, minimalist clock, timer, and
           countdown app for the desktop.
          EOF

          cat > "$PKG_ROOT/DEBIAN/postinst" <<'EOF'
          #!/bin/sh
          set -e
          if command -v update-desktop-database >/dev/null 2>&1; then
            update-desktop-database /usr/share/applications || true
          fi
          exit 0
          EOF
          chmod 0755 "$PKG_ROOT/DEBIAN/postinst"

          dpkg-deb --build --root-owner-group "$PKG_ROOT" "MinimalClock.deb"

      - name: Build AppImage
        run: |
          set -e
          APPDIR="AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp -R "$BUNDLE_DIR"/. "$APPDIR/usr/bin/"

          mkdir -p "$APPDIR/usr/share/applications"
          cat > "$APPDIR/usr/share/applications/${APP_ID}.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=${APP_DISPLAY_NAME}
          Comment=A beautiful minimalist clock app for desktop
          Exec=${APP_NAME} %u
          Icon=${APP_ID}
          Categories=Utility;Clock;
          MimeType=x-scheme-handler/minimalclock;
          Terminal=false
          EOF
          cp "$APPDIR/usr/share/applications/${APP_ID}.desktop" "$APPDIR/"

          mkdir -p "$APPDIR/usr/share/icons/hicolor/512x512/apps"
          cp /tmp/${APP_NAME}.png "$APPDIR/usr/share/icons/hicolor/512x512/apps/${APP_ID}.png"
          cp /tmp/${APP_NAME}.png "$APPDIR/${APP_ID}.png"
          cp /tmp/${APP_NAME}.png "$APPDIR/.DirIcon"

          cat > "$APPDIR/AppRun" <<EOF
          #!/bin/sh
          HERE="\$(dirname "\$(readlink -f "\${0}")")"
          exec "\${HERE}/usr/bin/${APP_NAME}" "\$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run "$APPDIR" "MinimalClock.AppImage"

      - name: Verify artifacts exist
        run: |
          ls -la MinimalClock.deb MinimalClock.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: MinimalClock-Linux-Deb
          path: MinimalClock.deb

      - uses: actions/upload-artifact@v4
        with:
          name: MinimalClock-Linux-AppImage
          path: MinimalClock.AppImage
