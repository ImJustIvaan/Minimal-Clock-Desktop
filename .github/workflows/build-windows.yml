name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # flutter_tools picks the windows build target (x64 vs arm64) purely
      # from the architecture of the *running* dart.exe (Abi.current()), so
      # an emulated x64 SDK always produces an x64 build even on this arm64
      # runner. Flutter's official release channel also has no arm64-native
      # SDK archive, so flutter-action can't install one either. Instead,
      # git-clone Flutter directly and let its own bootstrap script fetch
      # the native windows-arm64 Dart SDK (which Dart does publish) when run
      # under this runner's native arm64 PowerShell.
      - name: Install Flutter (native arm64)
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          git clone --branch 3.44.4 --depth 1 https://github.com/flutter/flutter.git "$env:RUNNER_TEMP\flutter"
          echo "$env:RUNNER_TEMP\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:RUNNER_TEMP\flutter\bin\flutter.bat" --version

      - uses: subosito/flutter-action@v2
        if: matrix.arch == 'x64'
        with:
          flutter-version: '3.44.4'
          channel: stable
          architecture: x64

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          if (!(Test-Path $iscc)) {
            Write-Error "ISCC.exe not found"
            exit 1
          }
          Write-Host "Running: $iscc /DArch=${{ matrix.arch }} installer.iss"
          & $iscc "/DArch=${{ matrix.arch }}" installer.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ISCC failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Verify installer exists
        shell: pwsh
        run: |
          $file = "MinimalClockSetup-${{ matrix.arch }}.exe"
          if (!(Test-Path $file)) {
            Write-Error "$file was not created!"
            exit 1
          }
          Write-Host "Installer size: $((Get-Item $file).Length) bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: MinimalClock-Windows-Installer-${{ matrix.arch }}
          path: MinimalClockSetup-${{ matrix.arch }}.exe
