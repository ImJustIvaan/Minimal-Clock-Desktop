name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            Write-Error "ISCC.exe not found at $iscc"
            exit 1
          }
          Write-Host "Running: $iscc installer.iss"
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ISCC failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Verify installer exists
        shell: pwsh
        run: |
          if (!(Test-Path "MinimalClockSetup.exe")) {
            Write-Error "MinimalClockSetup.exe was not created!"
            exit 1
          }
          Write-Host "Installer size: $((Get-Item MinimalClockSetup.exe).Length) bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: MinimalClock-Windows-Installer
          path: MinimalClockSetup.exe
