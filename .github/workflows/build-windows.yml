name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          # Flutter has no arm64-native Windows SDK archive; the x64 SDK
          # runs fine under Windows 11's x64 emulation and still detects
          # the real host CPU to build a native windows-arm64 app.
          architecture: x64

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          if (!(Test-Path $iscc)) {
            Write-Error "ISCC.exe not found"
            exit 1
          }
          Write-Host "Running: $iscc /DArch=${{ matrix.arch }} installer.iss"
          & $iscc "/DArch=${{ matrix.arch }}" installer.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ISCC failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Verify installer exists
        shell: pwsh
        run: |
          $file = "MinimalClockSetup-${{ matrix.arch }}.exe"
          if (!(Test-Path $file)) {
            Write-Error "$file was not created!"
            exit 1
          }
          Write-Host "Installer size: $((Get-Item $file).Length) bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: MinimalClock-Windows-Installer-${{ matrix.arch }}
          path: MinimalClockSetup-${{ matrix.arch }}.exe
