name: minimal_clock_desktop
description: A beautiful minimalist clock app for desktop.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  audioplayers: ^6.1.0
  window_manager: ^0.4.3
  local_notifier: ^0.1.6
  supabase_flutter: ^2.6.0
  share_plus: ^10.1.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
