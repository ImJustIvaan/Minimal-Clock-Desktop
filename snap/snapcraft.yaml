name: minimal-clock
version: '1.0.0'
summary: A clean, minimalist clock, timer, and countdown app for the desktop.
description: |
  Minimal Clock is a clean, minimalist clock, timer, and countdown app for
  the desktop. Digital or analog clock with optional fill-display mode, a
  countdown timer with a circular progress ring, named countdowns synced
  across devices, and light/dark themes.
website: https://time.ivaan.cc
contact: https://github.com/ImJustIvaan/Minimal-Clock-Desktop/issues
issues: https://github.com/ImJustIvaan/Minimal-Clock-Desktop/issues
source-code: https://github.com/ImJustIvaan/Minimal-Clock-Desktop

grade: stable
confinement: strict
base: core22

apps:
  minimal-clock:
    command: usr/bin/minimal_clock
    plugs:
      - network
      - audio-playback
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl

parts:
  minimal-clock:
    plugin: nil
    source: .
    build-packages:
      - curl
      - git
      - unzip
      - xz-utils
      - zip
      - clang
      - cmake
      - ninja-build
      - pkg-config
      - libgtk-3-dev
      - liblzma-dev
      - libstdc++-12-dev
      - libnotify-dev
      - libgstreamer1.0-dev
      - libgstreamer-plugins-base1.0-dev
    stage-packages:
      - libgtk-3-0
      - libnotify4
      - libgstreamer1.0-0
      - libgstreamer-plugins-base1.0-0
    override-build: |
      git clone --branch 3.44.4 --depth 1 https://github.com/flutter/flutter.git /root/flutter
      export PATH="/root/flutter/bin:$PATH"
      flutter config --enable-linux-desktop
      flutter pub get
      flutter build linux --release
      mkdir -p "$CRAFT_PART_INSTALL/usr/bin"
      cp -r build/linux/x64/release/bundle/* "$CRAFT_PART_INSTALL/usr/bin/"
